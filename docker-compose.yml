version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: infobot_db
    environment:
      POSTGRES_DB: infobot
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d infobot']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
